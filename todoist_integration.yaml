name: Todoist Integration
serverUserType: singleUser
shortDescription: MSB benchmark server (Todoist_Integration)
description: |
  MSB benchmark server `Todoist_Integration` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "mcp-remote"
    - "https://ai.todoist.net/mcp"
startupTimeoutSeconds: 300
