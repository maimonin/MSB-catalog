name: Desktop Commander
serverUserType: singleUser
shortDescription: MSB benchmark server (Desktop_Commander)
description: |
  MSB benchmark server `Desktop_Commander` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@wonderwhy-er/desktop-commander"
startupTimeoutSeconds: 300
