name: Met Museum
serverUserType: singleUser
shortDescription: MSB benchmark server (Met_Museum_Server)
description: |
  MSB benchmark server `Met_Museum_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "metmuseum-mcp"
startupTimeoutSeconds: 300
