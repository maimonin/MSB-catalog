name: Think Tool
serverUserType: singleUser
shortDescription: MSB benchmark server (Think_Tool_Server)
description: |
  MSB benchmark server `Think_Tool_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@smithery/cli@latest"
    - "run"
    - "@cgize/claude-mcp-think-tool"
startupTimeoutSeconds: 300
