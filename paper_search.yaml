name: Paper Search
serverUserType: singleUser
shortDescription: MSB benchmark server (Paper_Search)
description: |
  MSB benchmark server `Paper_Search` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@smithery/cli@latest"
    - "run"
    - "@openags/paper-search-mcp"
startupTimeoutSeconds: 300
env:
  - key: SMITHERY_API_KEY
    name: Smithery API Key
    required: true
    sensitive: true
    description: Your Smithery API key (from smithery.ai). Read from the container env by the Smithery CLI.
