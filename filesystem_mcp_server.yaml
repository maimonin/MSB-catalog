name: Filesystem
serverUserType: singleUser
shortDescription: MSB benchmark server (Filesystem_MCP_Server)
description: |
  MSB benchmark server `Filesystem_MCP_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@modelcontextprotocol/server-filesystem"
    - "/ABSOLUTE/PATH/TO/operation_space/output"
    - "/ABSOLUTE/PATH/TO/operation_space/information"
startupTimeoutSeconds: 300
