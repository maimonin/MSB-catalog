name: Memory Tool
serverUserType: singleUser
shortDescription: MSB benchmark server (Memory_Tool)
description: |
  MSB benchmark server `Memory_Tool` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@smithery/cli@latest"
    - "run"
    - "@mem0ai/mem0-memory-mcp"
startupTimeoutSeconds: 300
