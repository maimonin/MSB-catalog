name: Clear Thought
serverUserType: singleUser
shortDescription: MSB benchmark server (Clear_Thought_Server)
description: |
  MSB benchmark server `Clear_Thought_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@smithery/cli@latest"
    - "run"
    - "@chirag127/clear-thought-mcp-server"
startupTimeoutSeconds: 300
env:
  - key: SMITHERY_API_KEY
    name: Smithery API Key
    required: true
    sensitive: true
    description: Your Smithery API key (from smithery.ai). Read from the container env by the Smithery CLI.
