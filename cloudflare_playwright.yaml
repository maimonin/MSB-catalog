name: Cloudflare Playwright
serverUserType: singleUser
shortDescription: MSB benchmark server (Cloudflare_Playwright)
description: |
  MSB benchmark server `Cloudflare_Playwright` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "@playwright/mcp@latest"
startupTimeoutSeconds: 300
