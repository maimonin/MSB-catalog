name: Supabase
serverUserType: singleUser
shortDescription: MSB benchmark server (Supabase_MCP_Server)
description: |
  MSB benchmark server `Supabase_MCP_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "mcp-remote"
    - "https://mcp.supabase.com/mcp"
    - "--header"
    - "Authorization: Bearer <YOUR_SUPABASE_TOKEN>"
startupTimeoutSeconds: 300
