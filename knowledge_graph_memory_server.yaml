name: Knowledge Graph Memory
serverUserType: singleUser
shortDescription: MSB benchmark server (Knowledge_Graph_Memory_Server)
description: |
  MSB benchmark server `Knowledge_Graph_Memory_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@modelcontextprotocol/server-memory"
startupTimeoutSeconds: 300
