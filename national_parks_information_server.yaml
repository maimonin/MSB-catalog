name: National Parks Information
serverUserType: singleUser
shortDescription: MSB benchmark server (National_Parks_Information_Server)
description: |
  MSB benchmark server `National_Parks_Information_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "mcp-server-nationalparks"
startupTimeoutSeconds: 300
env:
  - key: NPS_API_KEY
    name: Nps Api Key
    required: true
    sensitive: true
    description: Provide your own National Parks Information NPS_API_KEY.
