name: Sequential Thinking Tools
serverUserType: singleUser
shortDescription: MSB benchmark server (Sequential_Thinking_Tools)
description: |
  MSB benchmark server `Sequential_Thinking_Tools` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@modelcontextprotocol/server-sequential-thinking"
startupTimeoutSeconds: 300
