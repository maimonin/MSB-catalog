name: Time
serverUserType: singleUser
shortDescription: MSB benchmark server (Time_MCP_Server)
description: |
  MSB benchmark server `Time_MCP_Server` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "time-mcp"
startupTimeoutSeconds: 300
