name: Bright Data
serverUserType: singleUser
shortDescription: MSB benchmark server (Bright_Data)
description: |
  MSB benchmark server `Bright_Data`. Imported for MCP Security Bench experiments.
metadata:
  categories: MSB-NPX
runtime: npx
npxConfig:
  package: "@brightdata/mcp"
  args: []
startupTimeoutSeconds: 300
env:
  - key: API_TOKEN
    name: Api Token
    required: true
    sensitive: true
    description: Provide your own Bright Data API_TOKEN.
