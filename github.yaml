name: Github
serverUserType: singleUser
shortDescription: MSB benchmark server (Github)
description: |
  MSB benchmark server `Github` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@smithery/cli@latest"
    - "run"
    - "@smithery-ai/github"
startupTimeoutSeconds: 300
