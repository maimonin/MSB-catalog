name: Linear
serverUserType: singleUser
shortDescription: MSB benchmark server (Linear)
description: |
  MSB benchmark server `Linear` (npx via stdio->HTTP runner). For MCP Security Bench experiments.
metadata:
  categories: MSB
runtime: containerized
containerizedConfig:
  image: msb-npx-runner:local
  port: 8099
  path: /mcp
  args:
    - "-y"
    - "@tacticlaunch/mcp-linear"
startupTimeoutSeconds: 300
env:
  - key: LINEAR_API_TOKEN
    name: Linear Api Token
    required: true
    sensitive: true
    description: Provide your own Linear LINEAR_API_TOKEN.
